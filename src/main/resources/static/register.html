<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP — Crear Cuenta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; }
    .register-wrapper {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .register-card {
      width: 100%; max-width: 420px;
      border: none; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: #0d6efd; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
<div class="register-wrapper">
  <div class="card register-card p-4">
    <div class="card-body">

      <div class="d-flex align-items-center gap-3 mb-4">
        <div class="brand-icon">
          <i class="bi bi-grid-fill text-white fs-4"></i>
        </div>
        <div>
          <h5 class="mb-0 fw-bold">ERP Sistema</h5>
          <small class="text-muted">Gestión empresarial</small>
        </div>
      </div>

      <h6 class="fw-semibold mb-1">Crear cuenta</h6>
      <p class="text-muted small mb-4">Completa los datos para registrarte</p>

      <div id="alert" class="alert d-none" role="alert"></div>

      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label fw-medium">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="tu@empresa.com" required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-medium">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Confirmar contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="confirm" class="form-control" placeholder="Repite la contraseña" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold" id="btnRegister">
          <span id="btnText">Crear Cuenta</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
        </button>
      </form>

      <hr class="my-4"/>
      <p class="text-center text-muted small mb-0">
        ¿Ya tienes cuenta?
        <a href="/login.html" class="text-decoration-none fw-medium">Inicia Sesión</a>
      </p>

    </div>
  </div>
</div>

<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnRegister');
    const spinner = document.getElementById('btnSpinner');
    const alertEl = document.getElementById('alert');
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    alertEl.classList.add('d-none');

    if (password !== confirm) {
      alertEl.className = 'alert alert-danger';
      alertEl.textContent = 'Las contraseñas no coinciden';
      alertEl.classList.remove('d-none');
      return;
    }

    btn.disabled = true;
    spinner.classList.remove('d-none');

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Error al registrarse');
      }

      const token = await res.text();
      localStorage.setItem('token', token);
      window.location.href = '/dashboard.html';

    } catch (err) {
      alertEl.className = 'alert alert-danger';
      alertEl.textContent = err.message;
      alertEl.classList.remove('d-none');
    } finally {
      btn.disabled = false;
      spinner.classList.add('d-none');
    }
  });
</script>
</body>
</html>
